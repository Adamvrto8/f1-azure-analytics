# ============================================================
# F1 Azure Analytics — CI/CD Pipeline
# ============================================================
# Triggers:
#   - On push to main: lint + validate + plan + apply
#   - On pull request: lint + validate + plan (no apply)
# ============================================================

name: F1 Analytics CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TERRAFORM_VERSION: "1.7.0"

jobs:
  # --------------------------------------------------------
  # Job 1: Lint and validate notebooks
  # --------------------------------------------------------
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 black

      - name: Lint Python notebooks
        run: |
          # Check for syntax errors and undefined names
          flake8 notebooks/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          # Check formatting
          black --check notebooks/ || echo "Formatting issues found (non-blocking)"

      - name: Validate notebook structure
        run: |
          echo "Checking notebook files exist..."
          test -f notebooks/01_setup_and_ingest_v2.py && echo "✓ 01_setup_and_ingest_v2.py"
          test -f notebooks/02_bronze_to_delta.py && echo "✓ 02_bronze_to_delta.py"
          test -f notebooks/03_silver_layer.py && echo "✓ 03_silver_layer.py"
          test -f notebooks/04_gold_layer.py && echo "✓ 04_gold_layer.py"
          test -f notebooks/05_ml_podium_predictor.py && echo "✓ 05_ml_podium_predictor.py"
          echo "All notebooks present!"

  # --------------------------------------------------------
  # Job 2: Terraform validate and plan
  # --------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        # Plan runs on both push and PR

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan

  # --------------------------------------------------------
  # Job 3: Terraform apply (only on push to main)
  # --------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # --------------------------------------------------------
  # Job 4: Deploy notebooks to Databricks
  # --------------------------------------------------------
  deploy-notebooks:
    name: Deploy Notebooks
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure Databricks CLI
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> ~/.databrickscfg
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.databrickscfg

      - name: Deploy notebooks to Databricks
        run: |
          # Create workspace directory if it doesn't exist
          databricks workspace mkdirs /Shared/f1-analytics || true

          # Upload each notebook
          for notebook in notebooks/*.py; do
            filename=$(basename "$notebook" .py)
            echo "Deploying $filename..."
            databricks workspace import "$notebook" \
              "/Shared/f1-analytics/$filename" \
              --language PYTHON \
              --overwrite
            echo "✓ $filename deployed"
          done

          echo "All notebooks deployed!"
