name: F1 Analytics CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8

      - name: Lint Python notebooks
        run: |
          flake8 notebooks/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          echo "Lint complete"

      - name: Validate notebook structure
        run: |
          echo "Checking notebook files..."
          for f in notebooks/*.py; do
            echo "✓ $(basename $f)"
          done
          echo "All notebooks present!"

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive || true

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate